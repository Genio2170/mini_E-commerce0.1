<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>ETNV - Loja</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo" onclick="window.location.href='home.html'">ETNV-ELECTRONICS</div>
    <div class="nav-links">
     <button class="nav-link" onclick="window.location.href='home.html'">Home</button>
      <button class="nav-link" onclick="setView('products',this)" id="nl-products">Produtos</button>
      <button class="nav-link" onclick="window.location.href='perfil.html'">
  Perfil
</button>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">
        <svg id="theme-icon-main" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="cart-btn" onclick="window.location.href='carrinho.html'">
        <svg class="cart-icon" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Carrinho
        <span class="cart-badge" id="cart-count">0</span>
      </button>
    </div>
  </nav>

  <!-- ────────── HOME VIEW ────────── -->
  <div id="view-home">
    <div class="hero-section">
      <div>
        <div class="hero-eyebrow">
          <span class="hero-eyebrow-dot"></span>
          Novidades disponíveis
        </div>
        <h1 class="hero-title">A <span>melhor</span><br>tecnologia<br>ao teu alcance</h1>
        <p class="hero-desc">Descobre a nossa seleção de eletrónicos premium — auriculares, teclados mecânicos, mouses gaming e muito mais.</p>
        <button class="btn-primary" onclick="setView('products')">Ver Todos os Produtos &rarr;</button>
      </div>
      <div class="hero-visual">
        <div class="hero-visual-graphic">
          <div class="hero-visual-ring">
            <div class="hero-visual-icon">
              <!-- Headphones SVG -->
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" style="width:28px;height:28px">
                <path d="M3 18v-6a9 9 0 0118 0v6"/>
                <path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3zM3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z"/>
              </svg>
            </div>
          </div>
          <div class="hero-visual-label">ETNV Premium Electronics</div>
        </div>
      </div>
    </div>

    <div class="categories-row">
      <button class="cat-chip active" onclick="filterCat('all',this)">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Todos
      </button>
      <button class="cat-chip" onclick="filterCat('audio',this)">
        <svg viewBox="0 0 24 24"><path d="M3 18v-6a9 9 0 0118 0v6"/><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3zM3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z"/></svg>
        Audio
      </button>
      <button class="cat-chip" onclick="filterCat('teclado',this)">
        <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/></svg>
        Teclados
      </button>
      <button class="cat-chip" onclick="filterCat('mouse',this)">
        <svg viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="18" rx="6"/><line x1="12" y1="3" x2="12" y2="9"/></svg>
        Mouses
      </button>
      <button class="cat-chip" onclick="filterCat('carregador',this)">
        <svg viewBox="0 0 24 24"><polyline points="23 7 13 17 8 12 1 18"/><polyline points="17 7 23 7 23 13"/></svg>
        Carregadores
      </button>
      <button class="cat-chip" onclick="filterCat('storage',this)">
        <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        Storage
      </button>
      <button class="cat-chip" onclick="filterCat('cabo',this)">
        <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Cabos
      </button>
      <button class="cat-chip" onclick="filterCat('gadget',this)">
        <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        Gadgets
      </button>
    </div>

    <div class="section-header">
      <div class="section-title">Em Destaque</div>
      <button class="see-all" onclick="setView('products')">Ver todos &rarr;</button>
    </div>
    <div class="products-grid" id="home-grid"></div>
  </div>

  <!-- ────────── PRODUCTS VIEW ────────── -->
  <div id="view-products" style="display:none;">
    <div class="section-header" style="padding-top:2rem;">
      <div class="section-title">Todos os Produtos</div>
    </div>
    <div class="search-bar-wrap">
      <div class="search-input-wrap">
        <span class="search-icon">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input class="search-input" type="text" placeholder="Pesquisar produtos..." id="search-input" oninput="onSearch()"/>
      </div>
    </div>
    <div class="categories-row">
      <button class="cat-chip active" onclick="filterCatP('all',this)">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Todos
      </button>
      <button class="cat-chip" onclick="filterCatP('audio',this)">Audio</button>
      <button class="cat-chip" onclick="filterCatP('teclado',this)">Teclados</button>
      <button class="cat-chip" onclick="filterCatP('mouse',this)">Mouses</button>
      <button class="cat-chip" onclick="filterCatP('carregador',this)">Carregadores</button>
      <button class="cat-chip" onclick="filterCatP('storage',this)">Storage</button>
      <button class="cat-chip" onclick="filterCatP('cabo',this)">Cabos</button>
      <button class="cat-chip" onclick="filterCatP('gadget',this)">Gadgets</button>
    </div>
    <div class="products-grid" id="products-grid"></div>
  </div>

  <!-- JS -->
  <script src="../js/api.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
