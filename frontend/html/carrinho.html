<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>ETNV - Carrinho</title>
  <!-- Tema carregado ANTES do CSS para evitar flash -->
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('etnv-theme') || 'dark');
  </script>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo" onclick="window.location.href='home.html'">ETNV-ELECTRONICS</div>
    <div class="nav-links">
      <button class="nav-link" onclick="window.location.href='home.html'">Home</button>
      <button class="nav-link" onclick="window.location.href='home.html?view=products'">Produtos</button>
      <button class="nav-link" onclick="window.location.href='perfil.html'">Perfil</button>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">
        <svg id="theme-icon-main" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="cart-btn" onclick="window.location.href='carrinho.html'">
        <svg class="cart-icon" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Carrinho
        <span class="cart-badge" id="cart-count">0</span>
      </button>
    </div>
  </nav>

  <!-- CART VIEW -->
  <div id="view-cart" style="display:flex;flex:1;">
    <div class="cart-layout">
      <div>
        <div class="cart-header">
          Carrinho
          <span class="cart-count-badge" id="cart-header-count">0 itens</span>
        </div>
        <div id="cart-items-list"></div>
      </div>
      <div>
        <div class="cart-summary">
          <div class="summary-title">Resumo do Pedido</div>
          <div class="summary-row"><span>Subtotal</span><span id="sum-sub">€0.00</span></div>
          <div class="summary-row"><span>Envio</span><span id="sum-ship">€0.00</span></div>
          <div class="summary-row"><span>Desconto</span><span id="sum-disc" style="color:var(--green)">€0.00</span></div>
          <div class="summary-row total"><span>Total</span><span id="sum-total">€0.00</span></div>
          <div class="promo-input">
            <input type="text" placeholder="Código promo..." id="promo-code"/>
            <button class="promo-btn" onclick="applyPromo()">Aplicar</button>
          </div>
          <button class="checkout-btn" onclick="checkout()">Finalizar Compra &rarr;</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/script.js"></script>

</body>
</html>
